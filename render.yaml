services:
  - type: web
    name: adn-api
    runtime: node
    rootDir: apps/api
    buildCommand: npm ci && npx prisma generate && npm run build
    startCommand: npx prisma db push --accept-data-loss && npm start
    healthCheckPath: /health
    envVars:
      - key: PORT
        value: 4000
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        sync: false
      - key: BOT_TOKEN
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: MINIAPP_URL
        value: https://adntrust.club
      - key: ADMIN_SECRET
        sync: false
      - key: ADMIN_TELEGRAM_USERNAME
        sync: false
      - key: ALLOWED_ORIGINS
        value: https://adntrust.club,https://www.adntrust.club

  - type: web
    name: adn-web
    runtime: static
    rootDir: apps/web
    buildCommand: cd /opt/render/project/src && npm install -g pnpm@9.15.0 && pnpm install --no-frozen-lockfile && pnpm --filter web build
    staticPublishPath: dist
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    envVars:
      - key: VITE_API_URL
        value: https://api.adntrust.club

  - type: worker
    name: adn-bot
    runtime: node
    rootDir: apps/bot
    buildCommand: npm install
    startCommand: npx tsx src/index.ts
    envVars:
      - key: BOT_TOKEN
        sync: false
      - key: MINIAPP_URL
        value: https://adntrust.club
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
